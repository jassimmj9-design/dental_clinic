# SonarQube Configuration for Dental Clinic

sonar.projectKey=dental_clinic
sonar.projectName=Dental Clinic
sonar.projectVersion=1.0.0
sonar.language=js

# Sources
sonar.sources=backend/src,frontend/src
sonar.exclusions=node_modules/**,**/*.test.js,**/*.spec.jsx,coverage/**,dist/**

# Tests
sonar.tests=backend/src/__tests__,frontend/src/__tests__
sonar.test.inclusions=**/*.test.js,**/*.spec.jsx

# Coverage
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/lcov.info

# Code Quality
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
